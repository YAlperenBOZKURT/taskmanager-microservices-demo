# TaskManager - Docker Compose Configuration
# All services and infrastructure for the task management system

# ==================== GLOBAL LOGGING LIMIT ====================
# Prevents Docker JSON log files from growing indefinitely.
# Each container: max 5 files x 10MB = 50MB max log storage.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ==================== INFRASTRUCTURE ====================

  # --- PostgreSQL for Auth Service ---
  postgres-auth:
    image: postgres:17
    container_name: postgres-auth
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PostgreSQL for Task Service ---
  postgres-task:
    image: postgres:17
    container_name: postgres-task
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_TASK_DB}
      POSTGRES_USER: ${POSTGRES_TASK_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TASK_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-task-data:/var/lib/postgresql/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TASK_USER} -d ${POSTGRES_TASK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MongoDB for Notification Service ---
  mongodb:
    image: mongo:8
    container_name: mongodb
    logging: *default-logging
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (Token / Cache) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Zookeeper (Kafka dependency) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    logging: *default-logging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok > /dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Kafka ---
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    logging: *default-logging
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- MinIO (Object Storage) ---
  minio:
    image: minio/minio:latest
    container_name: minio
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Elasticsearch ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=taskmanager-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- Logstash ---
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: logstash
    logging: *default-logging
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend/infrastructure/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./backend/infrastructure/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - taskmanager-net

  # --- Kibana ---
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    logging: *default-logging
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== MICROSERVICES ====================

  # --- API Gateway ---
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    logging: *default-logging
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Service Discovery (direct routing)
      AUTH_SERVICE_URL: http://auth-service:8081
      TASK_SERVICE_URL: http://task-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # JWT (same secret as auth-service)
      JWT_SECRET: ${JWT_SECRET}
      # Logstash
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    ports:
      - "8080:8080"
    networks:
      - taskmanager-net
    restart: on-failure

  # --- Auth Service ---
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    logging: *default-logging
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_AUTH_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Logstash
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    ports:
      - "8081:8081"
    networks:
      - taskmanager-net
    restart: on-failure

  # --- Task Service ---
  task-service:
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    container_name: task-service
    logging: *default-logging
    depends_on:
      postgres-task:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-task:5432/${POSTGRES_TASK_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_TASK_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_TASK_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      # Logstash
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    ports:
      - "8082:8082"
    networks:
      - taskmanager-net
    restart: on-failure

  # --- Notification Service ---
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    logging: *default-logging
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      # MongoDB
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Logstash
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    ports:
      - "8083:8083"
    networks:
      - taskmanager-net
    restart: on-failure

# ==================== VOLUMES ====================
volumes:
  postgres-auth-data:
  postgres-task-data:
  mongodb-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  minio-data:
  elasticsearch-data:

# ==================== NETWORKS ====================
networks:
  taskmanager-net:
    driver: bridge
